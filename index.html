<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Nihonjin AI</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- KaTeX for Math -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/json.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/xml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/css.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.9/dist/purify.min.js"></script>
    
    <style>
        :root {
            --bg-primary: #0a0c10;
            --bg-secondary: #0f1218;
            --bg-tertiary: #161a23;
            --bg-elevated: #1d222d;
            --bg-hover: #252b38;
            --text-primary: #e4e8ef;
            --text-secondary: #7d8696;
            --text-muted: #454d5c;
            --accent: #6366f1;
            --accent-dark: #4f46e5;
            --accent-glow: rgba(99, 102, 241, 0.15);
            --border: #2a3142;
            --error: #f43f5e;
            --success: #10b981;
            --warning: #f59e0b;
            --code-bg: #080a0f;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --font-sans: 'Space Grotesk', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --sidebar-width: 280px;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        
        html {
            height: 100%;
        }
        
        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100%;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Sidebar Styles */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 50;
            opacity: 0;
            visibility: hidden;
            transition: all 0.25s ease;
        }
        
        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: var(--sidebar-width);
            height: 100vh;
            height: 100dvh;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            z-index: 100;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }
        
        .sidebar.open {
            transform: translateX(0);
        }
        
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .sidebar-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .sidebar-close {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }
        
        .sidebar-close:hover {
            background: var(--bg-hover);
        }
        
        .sidebar-close svg {
            width: 16px;
            height: 16px;
            stroke: var(--text-secondary);
            fill: none;
            stroke-width: 2;
        }
        
        .sidebar-actions {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .sidebar-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .sidebar-btn:hover {
            background: var(--bg-hover);
            border-color: var(--accent);
        }
        
        .sidebar-btn.primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border-color: transparent;
        }
        
        .sidebar-btn.primary:hover {
            filter: brightness(1.1);
        }
        
        .sidebar-btn.danger {
            color: var(--error);
        }
        
        .sidebar-btn.danger:hover {
            background: rgba(244, 63, 94, 0.1);
            border-color: var(--error);
        }
        
        .sidebar-btn svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }
        
        .sidebar-btn.primary svg {
            stroke: white;
        }
        
        .chat-list-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 8px;
        }
        
        .chat-list-container::-webkit-scrollbar {
            width: 4px;
        }
        
        .chat-list-container::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }
        
        .chat-list-section {
            margin-bottom: 16px;
        }
        
        .chat-list-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 8px 12px 6px;
        }
        
        .chat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 4px;
            position: relative;
        }
        
        .chat-item:hover {
            background: var(--bg-hover);
        }
        
        .chat-item.active {
            background: var(--accent-glow);
            border: 1px solid var(--accent);
        }
        
        .chat-item-icon {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            background: var(--bg-elevated);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .chat-item-icon svg {
            width: 16px;
            height: 16px;
            stroke: var(--text-secondary);
            fill: none;
            stroke-width: 2;
        }
        
        .chat-item.active .chat-item-icon {
            background: var(--accent);
        }
        
        .chat-item.active .chat-item-icon svg {
            stroke: white;
        }
        
        .chat-item-content {
            flex: 1;
            min-width: 0;
        }
        
        .chat-item-title {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .chat-item-preview {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .chat-item-actions {
            display: none;
            gap: 4px;
        }
        
        .chat-item:hover .chat-item-actions {
            display: flex;
        }
        
        .chat-item-btn {
            width: 28px;
            height: 28px;
            border-radius: var(--radius-sm);
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }
        
        .chat-item-btn:hover {
            background: var(--bg-hover);
        }
        
        .chat-item-btn.delete:hover {
            background: rgba(244, 63, 94, 0.15);
            border-color: var(--error);
        }
        
        .chat-item-btn svg {
            width: 14px;
            height: 14px;
            stroke: var(--text-secondary);
            fill: none;
            stroke-width: 2;
        }
        
        .chat-item-btn.delete:hover svg {
            stroke: var(--error);
        }
        
        /* Main Chat App */
        .chat-app {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            min-height: 100dvh;
            background: var(--bg-secondary);
            position: relative;
            z-index: 1;
        }
        
        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .hamburger-btn {
            width: 38px;
            height: 38px;
            border-radius: var(--radius-sm);
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: all 0.15s;
        }
        
        .hamburger-btn:hover {
            background: var(--bg-hover);
        }
        
        .hamburger-btn span {
            width: 16px;
            height: 2px;
            background: var(--text-secondary);
            border-radius: 1px;
            transition: all 0.2s;
        }
        
        .logo {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 17px;
            color: white;
            flex-shrink: 0;
            overflow: hidden;
        }
        
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .header-info {
            flex: 1;
            min-width: 0;
        }
        
        .header-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .header-sub {
            font-size: 11px;
            color: var(--text-secondary);
        }
        
        .header-actions {
            display: flex;
            gap: 6px;
        }
        
        .icon-btn {
            width: 38px;
            height: 38px;
            border-radius: var(--radius-sm);
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }
        
        .icon-btn:active {
            background: var(--bg-tertiary);
        }
        
        .icon-btn svg {
            width: 18px;
            height: 18px;
            stroke: var(--text-secondary);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        
        .messages-wrapper {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            contain: content;
        }
        
        .messages-wrapper::-webkit-scrollbar {
            width: 4px;
        }
        
        .messages-wrapper::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }
        
        .msg {
            display: flex;
            gap: 10px;
            animation: fadeUp 0.2s ease-out;
            will-change: transform, opacity;
        }
        
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(6px); }
        }
        
        .msg.user {
            flex-direction: row-reverse;
        }
        
        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 13px;
            flex-shrink: 0;
            overflow: hidden;
        }
        
        .msg-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .msg.assistant .msg-avatar {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: white;
        }
        
        .msg.user .msg-avatar {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }
        
        .msg-body {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: var(--radius-lg);
            font-size: 14px;
            line-height: 1.6;
            word-wrap: break-word;
            position: relative;
        }
        
        .msg.assistant .msg-body {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-top-left-radius: var(--radius-sm);
        }
        
        .msg.user .msg-body {
            background: var(--accent);
            color: white;
            border-top-right-radius: var(--radius-sm);
        }
        
        .msg-body p { margin: 0 0 8px; }
        .msg-body p:last-child { margin: 0; }
        .msg-body strong { font-weight: 600; }
        .msg-body a { color: var(--accent); text-decoration: underline; }
        .msg-body ul, .msg-body ol { margin: 6px 0; padding-left: 16px; }
        .msg-body li { margin: 3px 0; }
        .msg-body li::marker { color: var(--accent); }
        .msg-body blockquote {
            margin: 8px 0;
            padding: 6px 12px;
            border-left: 3px solid var(--accent);
            background: var(--bg-secondary);
            color: var(--text-secondary);
        }
        
        .msg-body code {
            font-family: var(--font-mono);
            font-size: 13px;
            background: var(--code-bg);
            padding: 2px 5px;
            border-radius: 4px;
        }
        
        .msg-body pre {
            margin: 8px 0;
            background: var(--code-bg);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        
        .code-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
        }
        
        .code-lang {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
        }
        
        .copy-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 11px;
            color: var(--text-secondary);
            cursor: pointer;
        }
        
        .copy-btn.copied {
            color: var(--success);
            border-color: var(--success);
        }
        
        .copy-btn svg {
            width: 12px;
            height: 12px;
        }
        
        .msg-body pre code {
            display: block;
            padding: 12px;
            background: transparent;
            border: none;
            overflow-x: auto;
            white-space: pre;
            line-height: 1.5;
        }
        
        .msg-body table {
            display: block;
            overflow-x: auto;
            margin: 8px 0;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        .msg-body th, .msg-body td {
            padding: 8px 12px;
            border: 1px solid var(--border);
            text-align: left;
        }
        
        .msg-body th {
            background: var(--bg-tertiary);
            font-weight: 600;
        }
        
        /* KaTeX Styling */
        .msg-body .katex {
            font-size: 1em;
        }
        
        .msg-body .katex-display {
            margin: 12px 0;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 8px 0;
        }
        
        .msg-body .katex-display > .katex {
            white-space: normal;
        }
        
        .typing {
            display: flex;
            gap: 10px;
            animation: fadeUp 0.2s ease-out;
        }
        
        .typing-dots {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            border-top-left-radius: var(--radius-sm);
        }
        
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: bounce 1.3s infinite ease-in-out;
        }
        
        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.15s; }
        .dot:nth-child(3) { animation-delay: 0.3s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.8); }
            40% { transform: scale(1.1); background: var(--accent); }
        }
        
        .input-wrapper {
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border-top: 1px solid var(--border);
            position: sticky;
            bottom: 0;
        }
        
        .input-box {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 8px;
            transition: border-color 0.15s;
        }
        
        .input-box:focus-within {
            border-color: var(--accent);
        }
        
        .text-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 15px;
            line-height: 1.5;
            padding: 4px;
            resize: none;
            max-height: 100px;
            min-height: 22px;
            outline: none;
        }
        
        .text-input::placeholder {
            color: var(--text-muted);
        }
        
        .submit-btn {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            background: var(--accent);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.1s, opacity 0.15s;
        }
        
        .submit-btn:active {
            transform: scale(0.92);
        }
        
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .submit-btn svg {
            width: 18px;
            height: 18px;
            fill: white;
        }
        
        .toasts {
            position: fixed;
            top: 16px;
            left: 16px;
            right: 16px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        
        .toast {
            padding: 12px 16px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            pointer-events: auto;
            animation: slideIn 0.25s ease-out;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        .toast.out { animation: slideOut 0.15s ease-in forwards; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } }
        @keyframes slideOut { to { opacity: 0; transform: translateY(-8px); } }
        
        .toast.err { border-left: 3px solid var(--error); }
        .toast.ok { border-left: 3px solid var(--success); }
        .toast.warn { border-left: 3px solid var(--warning); }
        
        .toast svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }
        
        .toast.err svg { stroke: var(--error); }
        .toast.ok svg { stroke: var(--success); }
        .toast.warn svg { stroke: var(--warning); }
        
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 150;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            width: 100%;
            max-width: 360px;
            transform: scale(0.95);
            transition: transform 0.2s ease;
        }
        
        .modal-overlay.active .modal {
            transform: scale(1);
        }
        
        .modal-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
        }
        
        .modal-input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 14px;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.15s;
        }
        
        .modal-input:focus {
            border-color: var(--accent);
        }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        
        .modal-btn {
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .modal-btn.cancel {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }
        
        .modal-btn.cancel:hover {
            background: var(--bg-hover);
        }
        
        .modal-btn.confirm {
            background: var(--accent);
            border: none;
            color: white;
        }
        
        .modal-btn.confirm:hover {
            filter: brightness(1.1);
        }
        
        .chat-toggle {
            display: none;
        }
        
        @media (min-width: 768px) {
            body {
                background: linear-gradient(135deg, var(--bg-primary) 0%, #0d1017 100%);
                min-height: 100vh;
            }
            
            .chat-app {
                position: fixed;
                bottom: 20px;
                right: 20px;
                width: 400px;
                height: calc(100vh - 40px);
                max-height: 620px;
                min-height: 400px;
                border-radius: var(--radius-lg);
                border: 1px solid var(--border);
                box-shadow: 0 8px 40px rgba(0,0,0,0.4);
                opacity: 0;
                visibility: hidden;
                transform: translateY(10px);
                transition: all 0.25s ease;
            }
            
            .chat-app.open {
                opacity: 1;
                visibility: visible;
                transform: translateY(0);
            }
            
            .chat-toggle {
                display: flex;
                position: fixed;
                bottom: 20px;
                right: 20px;
                width: 54px;
                height: 54px;
                border-radius: 50%;
                background: linear-gradient(135deg, var(--accent), var(--accent-dark));
                border: none;
                cursor: pointer;
                align-items: center;
                justify-content: center;
                box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
                z-index: 50;
                transition: transform 0.15s;
            }
            
            .chat-toggle:hover {
                transform: scale(1.05);
            }
            
            .chat-toggle:active {
                transform: scale(0.95);
            }
            
            .chat-toggle svg {
                width: 24px;
                height: 24px;
                fill: white;
                transition: transform 0.2s;
            }
            
            .chat-toggle.active svg {
                transform: rotate(180deg);
            }
            
            .chat-header {
                position: relative;
            }
            
            .input-wrapper {
                position: relative;
            }
        }
        
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* === Tambahan untuk fitur edit pesan === */
        .msg-body {
            position: relative;
        }
        .msg-actions {
            position: absolute;
            top: 4px;
            right: 4px;
            display: none;
        }
        .msg.user .msg-body:hover .msg-actions {
            display: block;
        }
        .msg-edit-btn {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 4px;
            cursor: pointer;
            color: var(--text-secondary);
            line-height: 1;
            transition: all 0.15s;
        }
        .msg-edit-btn:hover {
            background: var(--bg-hover);
            color: var(--accent);
        }
        .msg-edit-btn svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }
        .edited-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-left: 4px;
        }
        .modal-input textarea {
            resize: vertical;
            min-height: 80px;
            font-family: var(--font-sans);
        }
        /* ===================================== */
    </style>
</head>
<body>
    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">Riwayat Chat</span>
            <button class="sidebar-close" id="sidebarClose">
                <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
        </div>
        
        <div class="sidebar-actions">
            <button class="sidebar-btn primary" id="newChatBtn">
                <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Chat Baru
            </button>
            <button class="sidebar-btn danger" id="deleteAllBtn">
                <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                Hapus Semua
            </button>
        </div>
        
        <div class="chat-list-container" id="chatListContainer">
            <!-- Chat items will be rendered here -->
        </div>
    </aside>
    
    <main class="chat-app" id="chatApp">
        <header class="chat-header">
            <button class="hamburger-btn" id="hamburgerBtn" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="logo" id="headerLogo">N</div>
            <div class="header-info">
                <div class="header-title" id="chatTitle">Nihonjin</div>
                <div class="header-sub">AI Assistant by Hizkia</div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="clearBtn" aria-label="Clear chat">
                    <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                </button>
            </div>
        </header>
        
        <div class="messages-wrapper" id="messagesWrapper"></div>
        
        <div class="input-wrapper">
            <div class="input-box">
                <textarea class="text-input" id="textInput" placeholder="Tulis pesan..." rows="1"></textarea>
                <button class="submit-btn" id="submitBtn" aria-label="Kirim">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </main>
    
    <button class="chat-toggle" id="chatToggle" aria-label="Toggle chat">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
    </button>
    
    <!-- Modal for Rename -->
    <div class="modal-overlay" id="renameModal">
        <div class="modal">
            <div class="modal-title">Ganti Nama Chat</div>
            <input type="text" class="modal-input" id="renameInput" placeholder="Nama chat baru...">
            <div class="modal-actions">
                <button class="modal-btn cancel" id="renameCancel">Batal</button>
                <button class="modal-btn confirm" id="renameConfirm">Simpan</button>
            </div>
        </div>
    </div>
    
    <!-- Modal for Delete Confirmation -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal">
            <div class="modal-title">Hapus Semua Chat?</div>
            <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 16px;">Semua riwayat percakapan akan dihapus permanen dan tidak dapat dikembalikan.</p>
            <div class="modal-actions">
                <button class="modal-btn cancel" id="deleteCancel">Batal</button>
                <button class="modal-btn confirm" style="background: var(--error);" id="deleteConfirm">Hapus</button>
            </div>
        </div>
    </div>
    
    <!-- Modal untuk Edit Pesan -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-title">Edit Pesan</div>
            <textarea class="modal-input" id="editMessageInput" rows="4" placeholder="Ubah pesan..."></textarea>
            <div class="modal-actions">
                <button class="modal-btn cancel" id="editCancel">Batal</button>
                <button class="modal-btn confirm" id="editConfirm">Simpan</button>
            </div>
        </div>
    </div>
    
    <div class="toasts" id="toasts"></div>

        const callAI = async (messages, onUpdate) => {
            if (!navigator.onLine) throw new Error('Tidak ada koneksi');
            
            const ctrl = new AbortController();
            S.ctrl = ctrl;
            const tout = setTimeout(() => ctrl.abort(), CFG.TIMEOUT);
            
            try {
                const res = await fetch(CFG.API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${CFG.API_KEY}`
                    },
                    body: JSON.stringify({

                        messages: messages,
                        max_tokens: CFG.MAX_TOKENS,
                        temperature: CFG.TEMP,
                        top_p: CFG.TOP_P,
                        stream: true
                    }),
                    signal: ctrl.signal
                });

                        const d = t.slice(5).trim();
                        if (d === '[DONE]') continue;
                        try {

                            const c = p.choices?.[0]?.delta?.content;
                            if (c) {
                                cnt += c;
                                if (onUpdate) onUpdate(cnt);
                            }
                        } catch (e) {}
                    }
                }

            $('deleteModal').classList.remove('active');
        };
        
        // Message Functions
        const esc = t => {
            const d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        };
        
        const clean = h => DOMPurify.sanitize(h, {
            ALLOWED_TAGS: ['p','br','strong','em','a','ul','ol','li','blockquote','code','pre','h1','h2','h3','h4','table','thead','tbody','tr','th','td','span','div'],
            ALLOWED_ATTR: ['href','class','style']
        });
        
        const toast = (m, t = 'info') => {
            const ico = {
                ok: '<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14 9 11"/></svg>',
                err: '<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg>',
                warn: '<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/></svg>'
            };
            const el = document.createElement('div');
            el.className = `toast ${t === 'success' ? 'ok' : t === 'error' ? 'err' : 'warn'}`;
            el.innerHTML = `${ico[t === 'success' ? 'ok' : t === 'error' ? 'err' : 'warn'] || ''}<span>${esc(m)}</span>`;
            $('toasts').appendChild(el);
            setTimeout(() => { el.classList.add('out'); setTimeout(() => el.remove(), 150); }, CFG.TOAST_MS);
        };
        
        const getAssistantAvatarHTML = () => {
            const avatarSrc = AVATAR_CONFIG.ASSISTANT_AVATAR;
            if (avatarSrc && avatarSrc.trim() !== '') {
                return `<img src="${avatarSrc}" alt="Nihonjin" />`;
            }
            return 'N';
        };
        
        const getUserAvatarHTML = () => {
            const avatarSrc = AVATAR_CONFIG.USER_AVATAR;
            if (avatarSrc && avatarSrc.trim() !== '') {
                return `<img src="${avatarSrc}" alt="User" />`;
            }
            return 'U';
        };
        
        const updateHeaderLogo = () => {
            const logoEl = $('headerLogo');
            logoEl.innerHTML = getAssistantAvatarHTML();
        };
        
        const initMd = () => {
            marked.setOptions({
                highlight: (c, l) => {
                    if (l && hljs.getLanguage(l)) {
                        try { return hljs.highlight(c, { language: l }).value; } catch (e) {}
                    }
                    return hljs.highlightAuto(c).value;
                },
                breaks: true,
                gfm: true
            });
        };
        
        const renderLatex = (container) => {
            if (typeof renderMathInElement === 'function') {
                renderMathInElement(container, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false},
                        {left: '\\[', right: '\\]', display: true},
                        {left: '\\(', right: '\\)', display: false}
                    ],
                    throwOnError: false,
                    trust: true
                });
            }
        };
        
        const mdCache = new Map();
        const MAX_CACHE_SIZE = 50;
        
        const renderMd = txt => {
            if (mdCache.has(txt)) {
                return mdCache.get(txt);
            }
            
            let processed = txt.replace(/\$\$([\s\S]*?)\$\$/g, (match, inner) => {
                const cleaned = inner.replace(/\s+/g, ' ').trim();
                return `$$${cleaned}$$`;
            });
            
            let h;
            try { h = marked.parse(processed); } catch (e) { h = esc(processed); }
            h = clean(h);
            
            const doc = new DOMParser().parseFromString(`<div>${h}</div>`, 'text/html');
            
            renderLatex(doc.body);
            
            doc.querySelectorAll('pre').forEach(pre => {
                const code = pre.querySelector('code');
                const ct = code ? code.textContent : pre.textContent;
                const lm = code && code.className.match(/language-(\w+)/);
                const ln = lm ? lm[1] : 'code';
                
                const hd = doc.createElement('div');
                hd.className = 'code-head';
                hd.innerHTML = `<span class="code-lang">${ln}</span>`;
                
                const btn = doc.createElement('button');
                btn.className = 'copy-btn';
                btn.setAttribute('data-code', encodeURIComponent(ct));
                btn.innerHTML = '<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><span>Copy</span>';
                hd.appendChild(btn);
                pre.parentNode.insertBefore(hd, pre);
            });
            
            const result = doc.body.innerHTML;
            
            if (mdCache.size >= MAX_CACHE_SIZE) {
                const firstKey = mdCache.keys().next().value;
                mdCache.delete(firstKey);
            }
            mdCache.set(txt, result);
            
            return result;
        };
        
        const addMsg = (txt, isUser, save = true) => {
            const avatarHTML = isUser ? getUserAvatarHTML() : getAssistantAvatarHTML();
            const msgId = save ? generateMessageId() : null;
            const h = `<div class="msg ${isUser ? 'user' : 'assistant'}" ${msgId ? `data-msg-id="${msgId}"` : ''}>
                <div class="msg-avatar">${avatarHTML}</div>
                <div class="msg-body">${isUser ? esc(txt) : ''}</div>
            </div>`;
            $('messagesWrapper').insertAdjacentHTML('beforeend', h);
            scrollBot();
            
            if (save && txt) {
                const chat = getCurrentChat();
                if (chat) {
                    chat.messages.push({ id: msgId, role: isUser ? 'user' : 'assistant', content: txt, edited: false });
                    chat.updatedAt = Date.now();
                    saveChatsToStorage();
                }
            }
            
            const el = $('messagesWrapper').lastElementChild;
            if (isUser && el) {
                addEditButtonToMessage(el);
            }
            return el;
        };
        
        const renderStoredMsg = (msg) => {
            const isUser = msg.role === 'user';
            const avatarHTML = isUser ? getUserAvatarHTML() : getAssistantAvatarHTML();
            const content = isUser ? esc(msg.content) : renderMd(msg.content);
            const editedLabel = msg.edited ? '<span class="edited-label"> (diedit)</span>' : '';
            const h = `<div class="msg ${isUser ? 'user' : 'assistant'}" data-msg-id="${msg.id}">
                <div class="msg-avatar">${avatarHTML}</div>
                <div class="msg-body">${content}${editedLabel}</div>
            </div>`;
            $('messagesWrapper').insertAdjacentHTML('beforeend', h);
            const el = $('messagesWrapper').lastElementChild;
            if (isUser && el) {
                addEditButtonToMessage(el);
            }
        };
        
        const showTyping = () => {
            const avatarHTML = getAssistantAvatarHTML();
            const h = `<div class="typing" id="typing">
                <div class="msg-avatar">${avatarHTML}</div>
                <div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            </div>`;
            $('messagesWrapper').insertAdjacentHTML('beforeend', h);
            scrollBot();
        };
        
        const hideTyping = () => { const t = $('typing'); if (t) t.remove(); };
        
        const setBusy = b => {
            S.busy = b;
            $('submitBtn').disabled = b;
            $('submitBtn').innerHTML = b ? '<div class="spinner"></div>' : '<svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>';
        };
        
        const copyCode = btn => {
            const code = decodeURIComponent(btn.getAttribute('data-code'));

            // Fungsi untuk menampilkan feedback sukses
            const showSuccess = () => {
                btn.classList.add('copied');
                btn.querySelector('span').textContent = 'Copied!';
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.querySelector('span').textContent = 'Copy';
                }, 2000);
            };

            // Fungsi fallback menggunakan execCommand
            const fallbackCopy = () => {
                const textarea = document.createElement('textarea');
                textarea.value = code;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    const success = document.execCommand('copy');
                    if (success) {
                        showSuccess();
                    } else {
                        toast('Gagal menyalin', 'error');
                    }
                } catch (e) {
                    toast('Gagal menyalin', 'error');
                }
                document.body.removeChild(textarea);
            };

            // Coba clipboard modern, jika gagal/tdk tersedia gunakan fallback
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(code)
                    .then(showSuccess)
                    .catch(fallbackCopy);
            } else {
                fallbackCopy();
            }
        };
        
        const getContextMessages = () => {
            const chat = getCurrentChat();
            if (!chat) return [];
            
            if (chat.messages.length <= CFG.MAX_CONTEXT_MESSAGES) {
                return chat.messages;
            }
            return chat.messages.slice(-CFG.MAX_CONTEXT_MESSAGES);
        };
        
        let lastScrollTime = 0;
        const throttledScroll = () => {
            const now = Date.now();
            if (now - lastScrollTime > 50) {
                lastScrollTime = now;
                scrollBot();
            }
        };
        
        const sendMsg = async (txt) => {
            if (!navigator.onLine) { toast('Tidak ada koneksi', 'error'); return; }
            
            const chat = getCurrentChat();
            if (!chat) return;
            
            // Update title jika ini pesan pertama (setelah welcome)
            if (chat.messages.length === 1) { // hanya welcome
                updateCurrentChatTitle(txt);
            }
            
            // Tambah pesan user
            addMsg(txt, true, true);
            
            setBusy(true);
            
            // Buat elemen kosong untuk respons
            const streamingEl = addEmptyAssistantMessage();
            
            try {
                const contextMsgs = getContextMessages();
                const msgs = [{ role: 'system', content: CFG.SYS }, ...contextMsgs];
                
                const responseContent = await callAI(msgs, (partial) => {
                    streamingEl.querySelector('.msg-body').innerHTML = renderMd(partial);
                    throttledScroll();
                });
                
                streamingEl.removeAttribute('id');
                
                const assistantMsgId = generateMessageId();
                chat.messages.push({ id: assistantMsgId, role: 'assistant', content: responseContent, edited: false });
                chat.updatedAt = Date.now();
                saveChatsToStorage();
                
                streamingEl.setAttribute('data-msg-id', assistantMsgId);
                scrollBot();
            } catch (e) {
                streamingEl.remove();
                toast(e.message, 'error');
            } finally {
                setBusy(false);
            }
        };
        
        const handleSend = async () => {
            const txt = $('textInput').value.trim();
            if (!txt || S.busy) return;
            
            $('textInput').value = '';
            $('textInput').style.height = 'auto';
            
            await sendMsg(txt);
        };
        
        const handleResize = debounce(() => {
            const was = S.mobile;
            S.mobile = window.innerWidth < 768;
            if (was !== S.mobile && S.mobile) {
                $('chatApp').classList.add('open');
            }
        }, 100);
        
        const init = () => {
            initMd();
            updateHeaderLogo();
            
            // Load chats from storage
            const storedChats = loadChatsFromStorage();
            
            // Normalisasi data lama (tambahkan ID dan properti edited, serta tambahkan welcome jika kosong)
            if (storedChats) {
                storedChats.forEach(chat => {
                    if (chat.messages) {
                        chat.messages.forEach(msg => {
                            if (!msg.id) msg.id = generateMessageId();
                            if (msg.edited === undefined) msg.edited = false;
                        });
                    } else {
                        chat.messages = [];
                    }
                    // Jika messages kosong, tambahkan welcome
                    if (chat.messages.length === 0) {
                        chat.messages.push({
                            id: generateMessageId(),
                            role: 'assistant',
                            content: CFG.WELCOME,
                            edited: false
                        });
                    }
                });
            }
            
            if (storedChats && storedChats.length > 0) {
                S.chats = storedChats;
                
                // Try to restore last active chat
                const lastChatId = localStorage.getItem(CURRENT_CHAT_KEY);
                const lastChat = S.chats.find(c => c.id === lastChatId);
                
                if (lastChat) {
                    S.currentChatId = lastChatId;
                } else {
                    S.currentChatId = S.chats[0].id;
                }
                
                loadChat(S.currentChatId);
            } else {
                // Create first chat
                createNewChat();
            }
            
            renderChatList();
            
            if (S.mobile) {
                $('chatApp').classList.add('open');
            } else {
                $('chatApp').classList.add('open');
                $('chatToggle').classList.add('active');
            }
            
            // Event Listeners
            $('submitBtn').addEventListener('click', handleSend);
            
            $('textInput').addEventListener('keydown', e => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            });
            
            $('textInput').addEventListener('input', () => {
                $('textInput').style.height = 'auto';
                $('textInput').style.height = Math.min($('textInput').scrollHeight, 100) + 'px';
            }, { passive: true });
            
            $('clearBtn').addEventListener('click', () => {
                const chat = getCurrentChat();
                if (chat) {
                    // Ganti dengan hanya welcome
                    chat.messages = [{
                        id: generateMessageId(),
                        role: 'assistant',
                        content: CFG.WELCOME,
                        edited: false
                    }];
                    chat.updatedAt = Date.now();
                    saveChatsToStorage();
                    $('messagesWrapper').innerHTML = '';
                    chat.messages.forEach(msg => renderStoredMsg(msg));
                    renderChatList();
                    toast('Chat dihapus', 'success');
                }
            });
            
            $('chatToggle').addEventListener('click', () => {
                $('chatApp').classList.toggle('open');
                $('chatToggle').classList.toggle('active');
            });
            
            // Sidebar events
            $('hamburgerBtn').addEventListener('click', openSidebar);
            $('sidebarClose').addEventListener('click', closeSidebar);
            $('sidebarOverlay').addEventListener('click', closeSidebar);
            
            $('newChatBtn').addEventListener('click', createNewChat);
            $('deleteAllBtn').addEventListener('click', showDeleteModal);
            
            // Chat item actions (delegated)
            $('chatListContainer').addEventListener('click', (e) => {
                const renameBtn = e.target.closest('.rename-btn');
                const deleteBtn = e.target.closest('.chat-item-btn.delete');
                
                if (renameBtn) {
                    e.stopPropagation();
                    showRenameModal(renameBtn.dataset.chatId);
                } else if (deleteBtn) {
                    e.stopPropagation();
                    deleteChat(deleteBtn.dataset.chatId);
                }
            });
            
            // Modal events
            $('renameCancel').addEventListener('click', hideRenameModal);
            $('renameConfirm').addEventListener('click', () => {
                if (S.renameChatId) {
                    renameChat(S.renameChatId, $('renameInput').value);
                    hideRenameModal();
                }
            });
            
            $('renameInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    if (S.renameChatId) {
                        renameChat(S.renameChatId, $('renameInput').value);
                        hideRenameModal();
                    }
                } else if (e.key === 'Escape') {
                    hideRenameModal();
                }
            });
            
            $('renameModal').addEventListener('click', (e) => {
                if (e.target === $('renameModal')) hideRenameModal();
            });
            
            $('deleteCancel').addEventListener('click', hideDeleteModal);
            $('deleteConfirm').addEventListener('click', () => {
                deleteAllChats();
                hideDeleteModal();
            });
            
            $('deleteModal').addEventListener('click', (e) => {
                if (e.target === $('deleteModal')) hideDeleteModal();
            });
            
            // Event listener untuk modal edit
            $('editCancel').addEventListener('click', hideEditModal);
            $('editConfirm').addEventListener('click', handleEditConfirm);
            $('editModal').addEventListener('click', (e) => {
                if (e.target === $('editModal')) hideEditModal();
            });
            
            document.addEventListener('click', e => {
                const btn = e.target.closest('.copy-btn');
                if (btn) copyCode(btn);
            });
            
            window.addEventListener('resize', handleResize, { passive: true });
            
            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeSidebar();
                    hideRenameModal();
                    hideDeleteModal();
                    hideEditModal();
                }
            });
        };
        
        const waitForKatex = () => {
            if (typeof katex !== 'undefined' && typeof renderMathInElement !== 'undefined') {
                init();
            } else {
                setTimeout(waitForKatex, 50);
            }
        };
        
        document.addEventListener('DOMContentLoaded', waitForKatex);
    </script>
</body>
</html>
